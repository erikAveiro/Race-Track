<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Rennspiel Advanced</title>

<style>
body { margin: 0; overflow: hidden; font-family: Arial; }

#menu {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  font-size: 20px;
  display: none;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Rennspiel</h1>
  <button id="startBtn">Start</button>
</div>

<div id="ui">
  Zeit: <span id="time">0.00</span>s
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let scene, camera, renderer;
let car;
let startPosition = new THREE.Vector3(60, 0.5, 0);
let lapActive = false;
let velocity = new THREE.Vector3();
let direction = 0;

let keys = {};
let started = false;
let carLoaded = false;

let startTime = 0;

init();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // Licht
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(20, 30, 10);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));

  createGround();
  createTrack();
  loadTrees();
  loadCar();

  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  animate();
}

// 🌱 Boden
function createGround() {
  const geo = new THREE.PlaneGeometry(600, 600);
  const mat = new THREE.MeshStandardMaterial({ color: 0x013220 });
  const ground = new THREE.Mesh(geo, mat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);
}

// 🛣 Strecke
function createTrack() {

  const trackWidth = 6;
  const segments = 200;
  const radius = 60;

  const leftPoints = [];
  const rightPoints = [];

  for (let i = 0; i <= segments; i++) {

    const t = i / segments;
    const angle = t * Math.PI * 2;

    const offset = Math.sin(i * 0.4) * 6;

    const x = Math.cos(angle) * (radius + offset);
    const z = Math.sin(angle) * (radius + offset);

    // Richtung der Strecke berechnen
    const nextAngle = (i + 1) / segments * Math.PI * 2;
    const nextX = Math.cos(nextAngle) * (radius + offset);
    const nextZ = Math.sin(nextAngle) * (radius + offset);

    const dir = new THREE.Vector3(nextX - x, 0, nextZ - z).normalize();

    // Senkrechter Vektor (links/rechts)
    const normal = new THREE.Vector3(-dir.z, 0, dir.x);

    // Linke & rechte Straßenseite
    leftPoints.push(new THREE.Vector3(
      x + normal.x * trackWidth,
      0.02,
      z + normal.z * trackWidth
    ));

    rightPoints.push(new THREE.Vector3(
      x - normal.x * trackWidth,
      0.02,
      z - normal.z * trackWidth
    ));
  }

  // Geometrie erstellen
  const vertices = [];
  const indices = [];

  for (let i = 0; i < segments; i++) {

    const a = leftPoints[i];
    const b = rightPoints[i];
    const c = leftPoints[i + 1];
    const d = rightPoints[i + 1];

    const index = vertices.length / 3;

    vertices.push(a.x, a.y, a.z);
    vertices.push(b.x, b.y, b.z);
    vertices.push(c.x, c.y, c.z);
    vertices.push(d.x, d.y, d.z);

    // zwei Dreiecke pro Segment
    indices.push(index, index + 1, index + 2);
    indices.push(index + 2, index + 1, index + 3);
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();

  const material = new THREE.MeshStandardMaterial({
    color: 0x2f2f2f,
    side: THREE.DoubleSide
  });

  const track = new THREE.Mesh(geometry, material);
  scene.add(track);
}

// 🌲 GLTF Bäume
function loadTrees() {

  const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 2);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });

  const leavesGeo = new THREE.ConeGeometry(1.2, 3, 8);
  const leavesMat = new THREE.MeshStandardMaterial({ color: 0x0b6623 });

  for (let i = 0; i < 200; i++) {

    const angle = Math.random() * Math.PI * 2;
    const radius = 75 + Math.random() * 25;
    //Innerhalb
    const radiusInner = 50 - Math.random() * 25;

    const x = Math.cos(angle) * radius;
    const z = Math.sin(angle) * radius;
    //Innerhalb
    const xInner = Math.cos(angle) * radiusInner;
    const zInner = Math.sin(angle) * radiusInner;

    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.set(x, 1, z);

    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
    leaves.position.set(x, 3, z);
    //Innerhalb
    const trunkInner = new THREE.Mesh(trunkGeo, trunkMat);
    trunkInner.position.set(xInner, 1, zInner);

    const leavesInner = new THREE.Mesh(leavesGeo, leavesMat);
    leavesInner.position.set(xInner, 3, zInner);

    scene.add(trunk);
    scene.add(leaves);
    //Innerhalb
    scene.add(trunkInner);
    scene.add(leavesInner);
  }
}

//ZielEinfahrt
function ZielEinfahrt(){
  
}

// 🚗 echtes Auto
function loadCar() {
  const loader = new GLTFLoader();

  loader.load(
    'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Flamingo.glb',
    (gltf) => {
      car = gltf.scene;

      car.scale.set(0.02, 0.02, 0.02);
      car.position.set(60,0.5,0);
      car.position.copy(startPosition);

      scene.add(car);

      carLoaded = true;
      console.log("Auto geladen");
    },
    undefined,
    (error) => {
      console.error("Fehler beim Laden des Autos:", error);
    }
  );
}

// 🎮 Physik
function updateCar() {
  if (!car) return;

  const accel = 0.002;
  const friction = 0.98;
  const turnSpeed = 0.05;

  // Vorwärts / Rückwärts
  if (keys['w']) velocity.z += accel;
  if (keys['s']) velocity.z -= accel;

  // Lenken abhängig von Geschwindigkeit
  if (keys['a']) direction += turnSpeed * velocity.length();
  if (keys['d']) direction -= turnSpeed * velocity.length();

  velocity.multiplyScalar(friction);

  // Bewegung relativ zur Rotation
  const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(
    new THREE.Vector3(0,1,0),
    direction
  );

  car.position.add(forward.clone().multiplyScalar(-velocity.z));

  car.rotation.y = direction;
  

  // Kamera
  const camOffset = new THREE.Vector3(0,5,12)
    .applyAxisAngle(new THREE.Vector3(0,1,0), direction);

  camera.position.lerp(
    new THREE.Vector3(
      car.position.x + camOffset.x,
      car.position.y + camOffset.y,
      car.position.z + camOffset.z
    ), 0.1);

  camera.lookAt(car.position);
}

function checkLap() {
  if (!car) return;

  const distance = car.position.distanceTo(startPosition);

  // Auto entfernt sich vom Start
  if (distance > 20) {
    lapActive = true;
  }

  // Auto kommt zurück → neue Runde
  if (distance < 5 && lapActive) {
    startTime = performance.now(); // 🔥 Timer reset
    lapActive = false;

    console.log("Neue Runde!");
  }
}

// ⏱ UI Zeit
function updateUI() {
  const t = (performance.now() - startTime) / 1000;
  document.getElementById("time").innerText = t.toFixed(2);
}

// 🔁 Loop
function animate() {
  requestAnimationFrame(animate);

  if (!car) {
  console.log("Auto noch nicht geladen...");
  } 

  if (started) {
    updateCar();
    updateUI();
    checkLap();
  }

  renderer.render(scene, camera);
}

// ▶️ Start
document.getElementById("startBtn").onclick = () => {
  
   if (!carLoaded) {
    
    alert("Auto lädt noch, bitte kurz warten...");
    return;
  }

  started = true;
  startTime = performance.now();

  document.getElementById("menu").style.display = "none";
  document.getElementById("ui").style.display = "block";
};
</script>
</body>
</html>
